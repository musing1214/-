<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>외근 관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #f4f6fb;
    --surface: #ffffff;
    --surface2: #f0f2f7;
    --border: #e2e5ef;
    --accent: #22c55e;
    --accent-dark: #16a34a;
    --accent2: #ef4444;
    --accent3: #3b82f6;
    --accent4: #f59e0b;
    --text: #1a1d2e;
    --muted: #8a8fa8;
    --radius: 14px;
    --shadow: 0 2px 10px rgba(0,0,0,0.07);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.11);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  /* LOGIN */
  #login-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
    background: linear-gradient(135deg, #f0fdf4 0%, #eff6ff 100%);
  }
  .login-logo { font-size: 11px; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; margin-bottom: 6px; font-family: 'DM Mono', monospace; }
  .login-title { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
  .login-sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; }
  .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px; width: 100%; max-width: 360px; box-shadow: var(--shadow-lg); }
  .login-label { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 7px; display: block; }
  .login-select, .login-input {
    width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 15px; padding: 13px 16px;
    margin-bottom: 14px; font-family: 'Noto Sans KR', sans-serif; appearance: none; outline: none; transition: border-color .2s;
  }
  .login-select:focus, .login-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(34,197,94,.1); }
  .btn-green { width: 100%; padding: 14px; border-radius: 10px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; background: var(--accent); color: white; transition: all .2s; }
  .btn-green:hover { background: var(--accent-dark); }
  .divider { height: 1px; background: var(--border); margin: 14px 0; }

  /* EMPLOYEE */
  #employee-screen { display: none; flex-direction: column; min-height: 100vh; max-width: 480px; margin: 0 auto; padding-bottom: 80px; }
  .app-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--surface); z-index: 10; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
  .app-header-name { font-size: 17px; font-weight: 700; }
  .app-header-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .logout-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; }
  .checkin-section { padding: 18px 16px; }
  .info-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px 16px; margin-bottom: 12px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px; }
  .status-dot { width: 11px; height: 11px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .status-dot.active { background: var(--accent); box-shadow: 0 0 0 4px rgba(34,197,94,.2); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 4px rgba(34,197,94,.2); } 50% { box-shadow: 0 0 0 8px rgba(34,197,94,.05); } }
  .status-info { flex: 1; }
  .status-label { font-size: 12px; color: var(--muted); }
  .status-value { font-size: 15px; font-weight: 600; margin-top: 2px; }
  .checkin-btn { width: 100%; padding: 18px; border-radius: 14px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all .2s; margin-bottom: 12px; }
  .checkin-btn.in { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; box-shadow: 0 6px 18px rgba(34,197,94,.3); }
  .checkin-btn.out { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; box-shadow: 0 6px 18px rgba(239,68,68,.3); }
  .checkin-btn:active { transform: scale(.98); }
  .checkin-btn:disabled { opacity: .6; }
  .field-input { width: 100%; background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; padding: 11px 14px; font-family: 'Noto Sans KR', sans-serif; outline: none; transition: border-color .2s; margin-bottom: 10px; appearance: none; }
  .field-input:focus { border-color: var(--accent3); box-shadow: 0 0 0 3px rgba(59,130,246,.1); }
  .records-section { padding: 0 16px; }
  .section-title { font-size: 11px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .record-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; display: flex; gap: 10px; align-items: flex-start; box-shadow: var(--shadow); }
  .record-type { font-size: 10px; font-weight: 700; letter-spacing: 1px; padding: 3px 7px; border-radius: 5px; flex-shrink: 0; margin-top: 2px; font-family: 'DM Mono', monospace; }
  .record-type.in { background: rgba(34,197,94,.12); color: #16a34a; }
  .record-type.out { background: rgba(239,68,68,.12); color: #dc2626; }
  .record-type.track { background: rgba(59,130,246,.12); color: #2563eb; font-size:8px; }
  .record-time { font-size: 14px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .record-addr { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
  .record-note { font-size: 12px; color: var(--accent3); margin-top: 3px; }
  .record-car { font-size: 11px; color: var(--accent4); margin-top: 3px; font-weight: 600; }
  .gps-loading { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); margin-bottom: 10px; }
  .spinner { width: 15px; height: 15px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ADMIN */
  #admin-screen { display: none; flex-direction: column; min-height: 100vh; }
  .admin-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
  .admin-title { font-size: 17px; font-weight: 700; }
  .admin-subtitle { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .tab-bar { display: flex; gap: 5px; padding: 8px 14px; border-bottom: 1px solid var(--border); overflow-x: auto; background: var(--surface); position: sticky; top: 55px; z-index: 99; }
  .tab { padding: 6px 13px; border-radius: 8px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); font-size: 13px; cursor: pointer; white-space: nowrap; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; transition: all .2s; }
  .tab.active { background: var(--accent); border-color: var(--accent); color: white; font-weight: 700; }
  #map { height: calc(100vh - 170px); width: 100%; min-height: 400px; }
  .admin-list { padding: 12px 16px; }
  .admin-record-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; display: flex; gap: 10px; align-items: flex-start; box-shadow: var(--shadow); }
  .emp-badge { font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 5px; flex-shrink: 0; font-family: 'DM Mono', monospace; }
  .filter-row { display: flex; gap: 6px; padding: 8px 14px; overflow-x: auto; background: var(--bg); border-bottom: 1px solid var(--border); }
  .filter-chip { padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--surface); color: var(--muted); font-size: 12px; cursor: pointer; white-space: nowrap; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; transition: all .2s; }
  .filter-chip.active { background: var(--accent3); border-color: var(--accent3); color: white; font-weight: 700; }
  .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 14px; line-height: 2; }
  .stat-row { display: flex; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .stat-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 10px; text-align: center; box-shadow: var(--shadow); }
  .stat-val { font-size: 22px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--accent); }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .map-legend { display: flex; gap: 14px; padding: 8px 16px; font-size: 12px; color: var(--muted); border-bottom: 1px solid var(--border); flex-wrap: wrap; background: var(--surface); }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; }
  .km-badge { background: rgba(245,158,11,.12); color: #b45309; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 5px; font-family: 'DM Mono', monospace; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: white; padding: 11px 20px; border-radius: 12px; font-size: 14px; z-index: 999; opacity: 0; transition: all .3s; white-space: nowrap; max-width: 90vw; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .del-btn { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.2); color: var(--accent2); border-radius: 7px; padding: 5px 10px; font-size: 12px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
  .del-btn:hover { background: rgba(239,68,68,.2); }
  .date-group-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 8px; margin-top: 12px; }
  .date-group-title { font-size: 13px; font-weight: 700; color: var(--text); }
  .date-group-km { font-size: 12px; color: var(--accent4); font-weight: 600; font-family: 'DM Mono', monospace; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">GPS TRACKER</div>
  <div class="login-title">외근 관리</div>
  <div class="login-sub">실시간 외근 기록 시스템</div>
  <div class="login-box">
    <label class="login-label">접속 유형</label>
    <select class="login-select" id="login-role">
      <option value="employee">직원</option>
      <option value="admin">관리자</option>
    </select>

    <div id="employee-select-wrap">
      <label class="login-label">직원 선택</label>
      <select class="login-select" id="login-emp"></select>
      <label class="login-label">차량 선택</label>
      <select class="login-select" id="login-car"></select>
    </div>

    <div id="admin-pw-wrap" style="display:none">
      <label class="login-label">관리자 비밀번호</label>
      <input type="password" class="login-input" id="admin-pw" placeholder="비밀번호 입력" style="margin-bottom:0">
    </div>
    <div class="divider"></div>
    <button class="btn-green" onclick="doLogin()">입장하기</button>
  </div>
</div>

<!-- EMPLOYEE -->
<div id="employee-screen">
  <div class="app-header">
    <div>
      <div class="app-header-name" id="emp-name-display"></div>
      <div class="app-header-sub" id="emp-date-display"></div>
    </div>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>

  <div class="checkin-section">
    <div class="info-card">
      <div class="status-dot" id="status-dot"></div>
      <div class="status-info">
        <div class="status-label">현재 상태</div>
        <div class="status-value" id="status-text">외근 대기</div>
      </div>
      <div style="font-size:12px;color:var(--muted);font-family:'DM Mono',monospace" id="status-time"></div>
    </div>

    <div class="info-card" style="padding:12px 14px">
      <span style="font-size:13px;color:var(--muted)">🚗</span>
      <span style="font-size:14px;font-weight:600" id="car-display">차량 미선택</span>
    </div>

    <textarea class="field-input" id="note-input" rows="2" placeholder="메모 (방문처, 목적 등) — 선택사항" style="resize:none"></textarea>

    <div class="gps-loading" id="gps-loading" style="display:none">
      <div class="spinner"></div> GPS 위치 확인 중...
    </div>

    <button class="checkin-btn in" id="checkin-btn" onclick="doCheckin()">📍 외근 시작 (체크인)</button>
  </div>

  <div class="records-section">
    <div class="section-title">오늘의 기록</div>
    <div id="emp-records"></div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <div class="admin-header">
    <div>
      <div class="admin-title">관리자 대시보드</div>
      <div class="admin-subtitle" id="admin-date"></div>
    </div>
    <div style="display:flex;gap:6px">
      <button class="logout-btn" onclick="reloadSheetData()">🔄</button>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('map')">🗺 지도</button>
    <button class="tab" onclick="switchTab('list')">📋 목록</button>
    <button class="tab" onclick="switchTab('stats')">📊 통계</button>
    <button class="tab" onclick="switchTab('members')">👥 직원</button>
    <button class="tab" onclick="switchTab('cars')">🚗 차량</button>
  </div>

  <!-- MAP TAB -->
  <div id="tab-map">
    <div class="filter-row" id="admin-filter-row"></div>
    <div class="map-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>체크인</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>체크아웃</div>
      <div class="legend-item"><div class="legend-dot" style="background:#3b82f6;width:7px;height:7px"></div>경유</div>
      <div class="legend-item"><div style="width:20px;height:3px;background:#3b82f6;border-radius:2px"></div>도로경로</div>
    </div>
    <div id="map"></div>
  </div>

  <!-- LIST TAB -->
  <div id="tab-list" style="display:none">
    <div class="filter-row" id="list-filter-row"></div>
    <div class="admin-list" id="admin-records-list"></div>
  </div>

  <!-- STATS TAB -->
  <div id="tab-stats" style="display:none">
    <div class="stat-row" id="stats-row"></div>
    <div class="admin-list" id="stats-detail"></div>
  </div>

  <!-- MEMBERS TAB -->
  <div id="tab-members" style="display:none">
    <div class="admin-list" id="members-list"></div>
    <div style="padding:0 16px 20px">
      <div class="section-title" style="margin-bottom:10px">새 직원 추가</div>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <input type="text" id="new-emp-name" class="field-input" placeholder="이름" style="margin-bottom:0;flex:1">
        <input type="color" id="new-emp-color" value="#3b82f6" style="width:44px;height:44px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);cursor:pointer;padding:2px">
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <input type="checkbox" id="new-emp-test" style="width:15px;height:15px;accent-color:var(--accent3)">
        <label for="new-emp-test" style="font-size:13px;color:var(--muted);cursor:pointer">테스트 유저</label>
      </div>
      <button class="btn-green" onclick="addEmployee()">+ 직원 추가</button>
    </div>
  </div>

  <!-- CARS TAB -->
  <div id="tab-cars" style="display:none">
    <div class="admin-list" id="cars-list"></div>
    <div style="padding:0 16px 20px">
      <div class="section-title" style="margin-bottom:10px">새 차량 추가</div>
      <input type="text" id="new-car-number" class="field-input" placeholder="차량 번호 (예: 12가 3456)">
      <input type="text" id="new-car-name" class="field-input" placeholder="차량 이름 (예: 봉고트럭)">
      <button class="btn-green" onclick="addCar()">+ 차량 추가</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──
const ADMIN_PASSWORD = '1234';
const STORAGE_KEY = 'gps_records_v2';
const EMP_STORAGE_KEY = 'gps_employees_v1';
const CAR_STORAGE_KEY = 'gps_cars_v1';
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxnhb_gj7TwjyKyDxjMznn-lSITUNuHyP4Y35-HTenALC1Nh8riE4yivuUkVP77iEw-Qw/exec';

let currentUser = null;
let currentCar = null;
let currentRole = null;
let isCheckedIn = false;
let map = null;
let mapMarkers = [];
let mapLines = [];
let currentFilter = 'ALL';
let listFilter = 'ALL';
let sheetRecords = [];

// ── EMPLOYEES ──
function getEmployees() {
  try {
    const s = JSON.parse(localStorage.getItem(EMP_STORAGE_KEY) || 'null');
    if (s && s.length) return s;
  } catch {}
  return [
    { id:1, name:'직원1', color:'#3b82f6', isTest:false },
    { id:2, name:'직원2', color:'#f59e0b', isTest:false },
    { id:3, name:'직원3', color:'#a78bfa', isTest:false },
    { id:4, name:'테스트', color:'#22c55e', isTest:true },
  ];
}

function saveEmployees(emps) {
  localStorage.setItem(EMP_STORAGE_KEY, JSON.stringify(emps));
  fetch(SHEET_URL, {
    method: 'POST',
    redirect: 'follow',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'saveEmployees', employees: emps })
  }).catch(()=>{});
}

async function loadEmployeesFromSheet() {
  try {
    const res = await fetch(SHEET_URL + '?type=employees');
    const json = await res.json();
    if (json.data && json.data.length) {
      localStorage.setItem(EMP_STORAGE_KEY, JSON.stringify(json.data));
      return json.data;
    }
  } catch {}
  return getEmployees();
}

function getEmpColor(name) { return getEmployees().find(e=>e.name===name)?.color || '#3b82f6'; }

// ── CARS ──
function getCars() {
  try {
    const s = JSON.parse(localStorage.getItem(CAR_STORAGE_KEY) || 'null');
    if (s && s.length) return s;
  } catch {}
  return [{ id:1, number:'미배정', name:'차량 없음' }];
}

function saveCars(cars) {
  localStorage.setItem(CAR_STORAGE_KEY, JSON.stringify(cars));
  fetch(SHEET_URL, {
    method: 'POST',
    redirect: 'follow',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'saveCars', cars })
  }).catch(()=>{});
}

async function loadCarsFromSheet() {
  try {
    const res = await fetch(SHEET_URL + '?type=cars');
    const json = await res.json();
    if (json.data && json.data.length) {
      localStorage.setItem(CAR_STORAGE_KEY, JSON.stringify(json.data));
      return json.data;
    }
  } catch {}
  return getCars();
}

// ── RECORDS ──
function getRecords() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
}
function saveRecord(rec) {
  const all = getRecords();
  all.push(rec);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
  fetch(SHEET_URL, {
    method: 'POST',
    redirect: 'follow',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'saveRecord', ...rec })
  }).catch(()=>{});
}
function getTodayRecords(emp) {
  const today = new Date().toLocaleDateString('ko-KR');
  return getRecords().filter(r => r.employee === emp && r.date === today);
}

// ── SHEET ──
async function fetchSheetRecords() {
  try {
    const res = await fetch(SHEET_URL);
    const json = await res.json();
    const rows = json.data || [];
    if (!rows.length) return [];
    return rows.map(r => {
      // time이 Date 객체 문자열로 깨진 경우 처리
      let time = r.time ? r.time.toString() : '';
      let date = r.date ? r.date.toString() : '';
      if (time.includes('1899') || time.includes('GMT')) {
        const d = new Date(time);
        if (!isNaN(d)) {
          time = d.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
        }
      }
      return {
        date, time,
        employee: r.employee || '',
        type: r.type || 'in',
        address: r.address || '',
        lat: parseFloat(r.lat) || 0,
        lng: parseFloat(r.lng) || 0,
        accuracy: r.accuracy || 0,
        note: r.note || '',
        car: r.car || '',
        timestamp: r.timestamp || ''
      };
    }).filter(r => r.lat && r.lng);
  } catch(e) {
    console.error('fetchSheetRecords error:', e);
    return [];
  }
}

let autoTrackTimer = null;

function startAutoTrack() {
  stopAutoTrack();
  autoTrackTimer = setInterval(() => {
    if (!isCheckedIn || !currentUser) return;
    navigator.geolocation.getCurrentPosition(async pos => {
      const lat = pos.coords.latitude, lng = pos.coords.longitude;
      const accuracy = Math.round(pos.coords.accuracy);
      const now = new Date();
      let addr = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=ko`);
        const data = await res.json();
        if (data.display_name) addr = data.display_name.split(',').slice(0,3).join(', ').trim();
      } catch {}
      const rec = {
        id: Date.now(), employee: currentUser, type: 'track', lat, lng, accuracy,
        address: addr, note: '', car: currentCar || '',
        time: now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),
        date: now.toLocaleDateString('ko-KR'), timestamp: now.toISOString()
      };
      saveRecord(rec);
      renderEmpRecords();
    }, () => {}, { enableHighAccuracy: true, timeout: 10000 });
  }, 2 * 60 * 1000); // 2분
}

function stopAutoTrack() {
  if (autoTrackTimer) { clearInterval(autoTrackTimer); autoTrackTimer = null; }
}

function checkInStatus() {
  const recs = getTodayRecords(currentUser);
  if (!recs.length) { setStatusOut(); return; }

}

function setStatusOut() {

  stopAutoTrack();

// OSRM으로 실제 도로 km 계산
async function calcRoadDistance(coords) {
  // coords: [{lat, lng}, {lat, lng}, ...]
  if (coords.length < 2) return null;
  try {
    const coordStr = coords.map(c => `${c.lng},${c.lat}`).join(';');
    const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${coordStr}?overview=false`);
    const data = await res.json();
    if (data.code === 'Ok' && data.routes[0]) {
      return (data.routes[0].distance / 1000).toFixed(1); // km
    }
  } catch {}
  return null;
}

function doCheckin() {
  const loading = document.getElementById('gps-loading');
  const btn = document.getElementById('checkin-btn');
  btn.disabled = true; loading.style.display = 'flex';
  if (!navigator.geolocation) { showToast('❌ GPS를 지원하지 않습니다'); btn.disabled=false; loading.style.display='none'; return; }
  navigator.geolocation.getCurrentPosition(async pos => {
    const lat = pos.coords.latitude, lng = pos.coords.longitude;
    const accuracy = Math.round(pos.coords.accuracy);
    const type = isCheckedIn ? 'out' : 'in';
    const note = document.getElementById('note-input').value.trim();
    const now = new Date();
    let addr = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=ko`);
      const data = await res.json();
      if (data.display_name) addr = data.display_name.split(',').slice(0,3).join(', ').trim();
    } catch {}

    // 체크아웃 시 OSRM으로 실제 도로 km 계산
    let roadKm = null;
    if (type === 'out') {
      const today = new Date().toLocaleDateString('ko-KR');
      const todayRecs = getRecords().filter(r => r.employee === currentUser && r.date === today);
      const coords = todayRecs.filter(r => r.lat && r.lng).map(r => ({lat: r.lat, lng: r.lng}));
      coords.push({lat, lng}); // 현재 체크아웃 위치 추가
      if (coords.length >= 2) {
        loading.querySelector ? null : null;
        roadKm = await calcRoadDistance(coords);
      }
    }

    const rec = {
      id: Date.now(), employee: currentUser, type, lat, lng, accuracy,
      address: addr, note, car: currentCar || '',
      time: now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),
      date: now.toLocaleDateString('ko-KR'), timestamp: now.toISOString(),
      roadKm: roadKm || null
    };
    saveRecord(rec);
    document.getElementById('note-input').value = '';
    if (type==='in') {
      setStatusIn(rec);
      showToast('✅ 체크인 완료');
    } else {
      setStatusOut();
      showToast(roadKm ? `✅ 체크아웃 완료 · 실제 주행 ${roadKm}km` : '✅ 체크아웃 완료');
    }
    loading.style.display = 'none'; btn.disabled = false;
    renderEmpRecords();
  }, () => { loading.style.display='none'; btn.disabled=false; showToast('❌ GPS 오류: 위치 권한을 허용해주세요'); },
  { enableHighAccuracy: true, timeout: 15000 });
}

  const el = document.getElementById('emp-records');
  if (!recs.length) { el.innerHTML = '<div class="empty-state">오늘 기록이 없습니다</div>'; return; }

// ── MAP ──
function initMap() {
  if (map) return;
  map = L.map('map', { zoomControl: true }).setView([37.5665, 126.9780], 12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO', maxZoom: 19
  }).addTo(map);
  updateMapMarkers();
}

function calcDistance(lat1,lng1,lat2,lng2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)*Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

async function fetchOsrmRoute(coords) {
  // coords: [[lat,lng], [lat,lng], ...]
  if (coords.length < 2) return null;
  try {
    const coordStr = coords.map(c => `${c[1]},${c[0]}`).join(';');
    const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${coordStr}?overview=full&geometries=geojson`);
    const data = await res.json();
    if (data.code === 'Ok' && data.routes[0]) {
      // GeoJSON coordinates는 [lng, lat] 순서 → [lat, lng]으로 변환
      return data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
    }
  } catch {}
  return null;
}

async function updateMapMarkers() {
  if (!map) return;
  mapMarkers.forEach(m => m.remove()); mapMarkers = [];
  mapLines.forEach(l => l.remove()); mapLines = [];

  const records = getFilteredRecords(currentFilter);
  if (!records.length) return;

  // 직원별로 그룹화
  const byEmp = {};
  records.forEach(r => { if(!byEmp[r.employee]) byEmp[r.employee]=[]; byEmp[r.employee].push(r); });

  const bounds = [];
  for (const [emp, recs] of Object.entries(byEmp)) {
    const empColor = getEmpColor(emp);
    const sorted = [...recs].sort((a,b) => new Date(a.timestamp)-new Date(b.timestamp));

    // OSRM 실제 도로 경로로 선 그리기
    if (sorted.length > 1) {
      const coords = sorted.map(r => [r.lat, r.lng]);
      const routeCoords = await fetchOsrmRoute(coords);
      if (routeCoords) {
        const line = L.polyline(routeCoords, { color: empColor, weight: 3, opacity: 0.75 }).addTo(map);
        mapLines.push(line);
      } else {
        // OSRM 실패 시 직선 fallback
        const line = L.polyline(coords, { color: empColor, weight: 2.5, opacity: 0.5, dashArray:'5,5' }).addTo(map);
        mapLines.push(line);
      }
    }
    // 마커 (track은 작은 점으로 표시)
    sorted.forEach(r => {
      const isTrack = r.type === 'track';
      const color = r.type==='in' ? '#22c55e' : r.type==='out' ? '#ef4444' : empColor;
      const icon = isTrack
        ? L.divIcon({
            className: '',
            html: `<div style="width:10px;height:10px;border-radius:50%;background:${empColor};border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>`,
            iconSize:[10,10], iconAnchor:[5,5]
          })
        : L.divIcon({
            className: '',
            html: `<div style="width:28px;height:28px;border-radius:50% 50% 50% 0;background:${color};border:3px solid ${empColor};transform:rotate(-45deg);box-shadow:0 2px 8px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;">
              <div style="transform:rotate(45deg);font-size:10px;color:white;font-weight:700">${r.type==='in'?'▲':'▼'}</div></div>`,
            iconSize:[28,28], iconAnchor:[14,28]
          });
      const marker = L.marker([r.lat,r.lng],{icon}).addTo(map).bindPopup(`
        <div style="font-family:'Noto Sans KR',sans-serif;min-width:180px;font-size:13px">
          <strong style="color:${empColor}">${r.employee}</strong>
          <span style="margin-left:6px;font-size:10px;background:${color}22;color:${color};padding:2px 6px;border-radius:4px">${r.type==='in'?'체크인':r.type==='out'?'체크아웃':'경유'}</span>
          <div style="margin-top:5px;color:#666">${r.time} · ${r.date}</div>
          <div style="margin-top:3px">${r.address}</div>
          ${r.car ? `<div style="margin-top:3px;color:#b45309">🚗 ${r.car}</div>` : ''}
          ${r.note ? `<div style="margin-top:3px;color:#3b82f6">💬 ${r.note}</div>` : ''}
          <div style="margin-top:3px;color:#999;font-size:11px">GPS ±${r.accuracy}m</div>
        </div>`);
      mapMarkers.push(marker);
      bounds.push([r.lat, r.lng]);
    });
  }
  if (bounds.length) map.fitBounds(bounds, { padding:[40,40] });
}

// ── LIST with km + date grouping + delete ──
function renderAdminList() {
  const recs = getFilteredRecords(listFilter);
  const el = document.getElementById('admin-records-list');
  if (!recs.length) { el.innerHTML = '<div class="empty-state">기록이 없습니다</div>'; return; }

  // 날짜별 그룹화
  const byDate = {};
  recs.forEach(r => { if(!byDate[r.date]) byDate[r.date]=[]; byDate[r.date].push(r); });

  const dates = Object.keys(byDate).sort((a,b) => new Date(b)-new Date(a));
  el.innerHTML = dates.map(date => {
    const dateRecs = byDate[date].sort((a,b) => b.time.localeCompare(a.time));
    // km 계산 (해당 날짜 동선)
    let totalKm = 0;
    const sorted = [...byDate[date]].sort((a,b)=>a.time.localeCompare(b.time));
    for (let i=1; i<sorted.length; i++) {
      if (sorted[i].lat && sorted[i-1].lat) {
        totalKm += calcDistance(sorted[i-1].lat, sorted[i-1].lng, sorted[i].lat, sorted[i].lng);
      }
    }
    return `
      <div class="date-group-header">
        <span class="date-group-title">${date}</span>
        <div style="display:flex;align-items:center;gap:8px">
          ${totalKm>0 ? `<span class="km-badge">📍 ${totalKm.toFixed(1)}km</span>` : ''}
          <button class="del-btn" onclick="deleteByDate('${date}')">🗑 삭제</button>
        </div>
      </div>
      ${dateRecs.map(r => {
        const empColor = getEmpColor(r.employee);
        const typeColor = r.type==='in' ? '#22c55e' : '#ef4444';
        return `
          <div class="admin-record-item">
            <div class="emp-badge" style="color:${empColor};background:${empColor}18">${r.employee}</div>
            <div style="flex:1">
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
                <span style="font-size:13px;font-weight:700;font-family:'DM Mono',monospace">${r.time}</span>
                <span style="font-size:10px;background:${typeColor}18;color:${typeColor};padding:2px 6px;border-radius:4px;font-weight:700">${r.type==='in'?'IN':'OUT'}</span>
              </div>
              <div style="font-size:12px;color:var(--muted)">${r.address}</div>
              ${r.car ? `<div style="font-size:11px;color:#b45309;margin-top:2px">🚗 ${r.car}</div>` : ''}
              ${r.note ? `<div style="font-size:12px;color:var(--accent3);margin-top:2px">💬 ${r.note}</div>` : ''}
              <div style="font-size:11px;color:var(--muted);margin-top:2px">GPS ±${r.accuracy}m</div>
            </div>
          </div>`;
      }).join('')}
    `;
  }).join('');
}

function deleteByDate(date) {
  if (!confirm(`${date} 의 기록을 삭제할까요?\n(로컬 기록만 삭제됩니다)`)) return;
  const recs = getRecords().filter(r => r.date !== date);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(recs));
  sheetRecords = sheetRecords.filter(r => r.date !== date);
  renderAdminList();
  renderStats();
  updateMapMarkers();
  showToast(`🗑 ${date} 기록 삭제 완료`);
}

    });

    return `
      <div class="admin-record-item">
        <div class="emp-badge" style="color:${emp.color};background:${emp.color}18">${emp.name}${emp.isTest?' 🧪':''}</div>
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-weight:600">${emp.name}</span>
            <span style="font-size:12px;color:${statusColor};font-weight:600">${statusText}</span>
          </div>
          <div style="font-size:12px;color:var(--muted);margin-top:3px">
            오늘 ${todayRecs.length}회 · 누적 ${empRecs.length}회 · <span style="color:#b45309;font-weight:600">${empKm.toFixed(1)}km</span>
          </div>
          ${lastRec ? `<div style="font-size:11px;color:var(--muted);margin-top:2px">마지막: ${lastRec.date} ${lastRec.time}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

// ── MEMBERS ──
function renderMembers() {
  const emps = getEmployees();
  const el = document.getElementById('members-list');
  if (!emps.length) { el.innerHTML = '<div class="empty-state">직원이 없습니다</div>'; return; }
  const regular = emps.filter(e=>!e.isTest), test = emps.filter(e=>e.isTest);
  const renderGroup = (list, label) => !list.length ? '' : `
    <div class="section-title" style="margin-bottom:8px">${label}</div>
    ${list.map(emp=>`
      <div class="admin-record-item" style="align-items:center">
        <div style="width:13px;height:13px;border-radius:50%;background:${emp.color};flex-shrink:0"></div>
        <div style="flex:1">
          <input type="text" value="${emp.name}" onchange="renameEmployee(${emp.id},this.value)"
            style="background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-size:15px;font-weight:600;font-family:'Noto Sans KR',sans-serif;outline:none;width:100%;padding:2px 0">
        </div>
        <input type="color" value="${emp.color}" onchange="recolorEmployee(${emp.id},this.value)"
          style="width:30px;height:30px;border:1.5px solid var(--border);border-radius:6px;cursor:pointer;padding:1px;flex-shrink:0">
        <button onclick="deleteEmployee(${emp.id})" style="background:none;border:none;color:var(--accent2);font-size:17px;cursor:pointer;padding:0 4px">✕</button>
      </div>`).join('')}`;
  el.innerHTML = `<div style="padding:14px 16px">${renderGroup(regular,'STAFF')}${test.length?renderGroup(test,'TEST'):''}</div>`;
}

function renameEmployee(id, newName) {
  if (!newName.trim()) { showToast('❌ 이름을 입력해주세요'); return; }
  const emps = getEmployees(), emp = emps.find(e=>e.id===id);
  if (!emp) return;
  const old = emp.name; emp.name = newName.trim(); saveEmployees(emps);
  const recs = getRecords(); recs.forEach(r=>{ if(r.employee===old) r.employee=newName.trim(); });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(recs));
  showToast('✅ 이름 변경 완료'); refreshAdminFilters();
}

function recolorEmployee(id, color) {
  const emps = getEmployees(), emp = emps.find(e=>e.id===id);
  if (!emp) return; emp.color = color; saveEmployees(emps); showToast('✅ 색상 변경 완료');
}

function deleteEmployee(id) {
  const emps = getEmployees(), emp = emps.find(e=>e.id===id);
  if (!emp || !confirm(`'${emp.name}' 삭제할까요?`)) return;
  saveEmployees(emps.filter(e=>e.id!==id)); renderMembers(); refreshAdminFilters(); showToast('🗑 삭제됨');
}

function addEmployee() {
  const name = document.getElementById('new-emp-name').value.trim();
  const color = document.getElementById('new-emp-color').value;
  const isTest = document.getElementById('new-emp-test').checked;
  if (!name) { showToast('❌ 이름을 입력해주세요'); return; }
  const emps = getEmployees();
  if (emps.find(e=>e.name===name)) { showToast('❌ 이미 존재하는 이름'); return; }
  const newId = Math.max(...emps.map(e=>e.id),0)+1;
  emps.push({id:newId, name, color, isTest}); saveEmployees(emps);
  document.getElementById('new-emp-name').value='';
  renderMembers(); refreshAdminFilters(); showToast(`✅ '${name}' 추가됨`);
}

// ── CARS ──
function renderCars() {
  const cars = getCars();
  const el = document.getElementById('cars-list');
  if (!cars.length) { el.innerHTML = '<div class="empty-state">등록된 차량이 없습니다</div>'; return; }
  el.innerHTML = `<div style="padding:14px 16px">
    <div class="section-title" style="margin-bottom:8px">등록 차량</div>
    ${cars.map(c=>`
      <div class="admin-record-item" style="align-items:center">
        <span style="font-size:18px">🚗</span>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:700">${c.name}</div>
          <div style="font-size:12px;color:var(--muted);font-family:'DM Mono',monospace">${c.number}</div>
        </div>
        <button onclick="deleteCar(${c.id})" style="background:none;border:none;color:var(--accent2);font-size:17px;cursor:pointer">✕</button>
      </div>`).join('')}
  </div>`;
}

function addCar() {
  const number = document.getElementById('new-car-number').value.trim();
  const name = document.getElementById('new-car-name').value.trim();
  if (!number || !name) { showToast('❌ 차량 번호와 이름을 입력해주세요'); return; }
  const cars = getCars();
  if (cars.find(c=>c.number===number)) { showToast('❌ 이미 등록된 차량번호'); return; }
  const newId = Math.max(...cars.map(c=>c.id),0)+1;
  cars.push({id:newId, number, name}); saveCars(cars);
  document.getElementById('new-car-number').value='';
  document.getElementById('new-car-name').value='';
  renderCars(); populateLoginSelect(); showToast(`✅ '${name}' 등록됨`);
}

function deleteCar(id) {
  const cars = getCars(), car = cars.find(c=>c.id===id);
  if (!car || !confirm(`'${car.name}' 삭제할까요?`)) return;
  saveCars(cars.filter(c=>c.id!==id)); renderCars(); populateLoginSelect(); showToast('🗑 삭제됨');
}

// ── FILTERS ──
function refreshAdminFilters() {
  const emps = getEmployees();
  const html = (fn) => `
    <button class="filter-chip active" data-emp="ALL" onclick="${fn}(this)">전체</button>
    ${emps.map(e=>`<button class="filter-chip" data-emp="${e.name}" onclick="${fn}(this)">${e.name}${e.isTest?' 🧪':''}</button>`).join('')}`;
  document.getElementById('admin-filter-row').innerHTML = html('filterAdmin');
  document.getElementById('list-filter-row').innerHTML = html('filterList');
  populateLoginSelect();
}

// ── UTILS ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
